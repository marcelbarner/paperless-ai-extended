services:
  broker:
    image: docker.io/library/redis:8
    restart: unless-stopped
    volumes:
      - redisdata:/data

  db:
    image: docker.io/library/postgres:16
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: paperless

  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on:
      - db
      - broker
    ports:
      - "8000:8000"
    volumes:
      - data:/usr/src/paperless/data
      - media:/usr/src/paperless/media
      - ./export:/usr/src/paperless/export
      - ./consume:/usr/src/paperless/consume
    env_file: docker-compose.env
    environment:
      PAPERLESS_REDIS: redis://broker:6379
      PAPERLESS_DBHOST: db

  paperless-ai:
    build: .
    image: paperless-ai:latest
    restart: unless-stopped
    depends_on:
      - webserver
    ports:
      - "8001:5000"
    volumes:
      - paperless-ai-data:/app/data
    environment:
      # Paperless im selben Compose-Netzwerk über Service-Name erreichbar
      Paperless__BaseUrl: http://webserver:8000
      # Azure-Credentials und weitere Einstellungen über die UI unter :8001/settings

volumes:
  data:
  media:
  pgdata:
  redisdata:
  paperless-ai-data:
